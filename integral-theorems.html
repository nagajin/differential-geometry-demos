<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3大積分定理ビジュアライザ — ストークス・ガウス発散・グリーン</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --border:#2a323d;
    --text:#d6dde6; --muted:#8b97a6; --accent:#4ea1ff; --accent2:#ffb454; --good:#5ad19a; --bad:#ff6b6b;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; }
  #app { display:flex; height:100vh; overflow:hidden; }
  #stage { flex:1; position:relative; min-width:0; }
  canvas { display:block; width:100%; height:100%; background:radial-gradient(circle at 50% 42%,#131a24 0%,#0e1116 72%); cursor:grab; }
  canvas:active { cursor:grabbing; }
  #sidebar { width:340px; flex:0 0 340px; background:var(--panel); border-left:1px solid var(--border);
    overflow-y:auto; padding:16px 16px 40px; font-size:13px; }
  h1 { font-size:15px; margin:0 0 2px; }
  .sub { color:var(--muted); font-size:11px; margin:0 0 12px; line-height:1.5; }
  .nav { font-size:11px; margin:0 0 12px; }
  .nav a { color:var(--accent); text-decoration:none; }
  .nav a:hover { text-decoration:underline; }
  .group { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
  .group h2 { font-size:12px; margin:0 0 10px; color:var(--accent); font-weight:600; }
  .btn-row { display:flex; gap:6px; flex-wrap:wrap; }
  button { background:#233040; color:var(--text); border:1px solid var(--border); border-radius:8px;
    padding:7px 9px; font-size:12px; cursor:pointer; transition:background .12s,border-color .12s; font-family:inherit; }
  button:hover { background:#2c3c50; border-color:#3a4a5e; }
  button.active { background:var(--accent2); color:#2a1c05; border-color:var(--accent2); font-weight:600; }
  button.wide { flex:1; }
  select { width:100%; background:#233040; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:7px; font-size:12px; font-family:inherit; }
  label.row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:9px 0; }
  label.row span.lab { color:var(--muted); flex:0 0 auto; }
  label.row span.val { color:var(--text); font-variant-numeric:tabular-nums; min-width:52px; text-align:right; }
  input[type=range] { flex:1; accent-color:var(--accent); }
  .check { display:flex; align-items:center; gap:8px; margin:8px 0; cursor:pointer; }
  .check input { accent-color:var(--accent); width:15px; height:15px; }
  #thm { font-variant-numeric:tabular-nums; line-height:1.8; }
  #thm .m { display:flex; justify-content:space-between; gap:8px; }
  #thm .lhs { color:var(--accent2); }
  #thm .rhs { color:var(--good); }
  #thm .eq { font-size:11px; color:var(--muted); margin:2px 0 6px; line-height:1.5; }
  #thm .match { text-align:center; margin-top:8px; font-weight:600; padding:5px; border-radius:7px; }
  #thm .match.ok { background:rgba(90,209,154,.12); color:var(--good); }
  #thm .match.no { background:rgba(255,107,107,.12); color:var(--bad); }
  #status { position:absolute; top:14px; left:16px; font-size:12px; color:var(--muted);
    background:rgba(14,17,22,.7); padding:6px 10px; border-radius:8px; border:1px solid var(--border);
    pointer-events:none; backdrop-filter:blur(4px); max-width:70%; line-height:1.5; }
  #status b { color:var(--accent2); }
  #hintbar { position:absolute; bottom:12px; left:16px; font-size:11px; color:var(--muted);
    background:rgba(14,17,22,.6); padding:5px 9px; border-radius:7px; pointer-events:none; }
  .hint { color:var(--muted); font-size:11px; line-height:1.55; margin-top:6px; }
  .legend { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); margin-top:8px; }
  .legend .bar { height:10px; flex:1; border-radius:4px; background:linear-gradient(90deg,#3b82f6,#e5e7eb,#ef4444); }
  hr.sep { border:none; border-top:1px solid var(--border); margin:10px 0; }
  code { background:#0e1116; padding:1px 5px; border-radius:4px; color:var(--accent2); font-size:11px; }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="status"></div>
    <div id="hintbar"></div>
  </div>
  <div id="sidebar">
    <h1>3大積分定理ビジュアライザ</h1>
    <p class="sub">グリーン・ガウス発散・ストークスの定理を、両辺を数値計算して一致させて確かめます。</p>
    <p class="nav">▸ <a href="https://nagajin.github.io/differential-geometry-demos/">デモ一覧</a> &nbsp;/&nbsp; <a href="curvature-visualizer.html">曲率ビジュアライザ</a></p>

    <div class="group">
      <h2>定理（モード）</h2>
      <div class="btn-row">
        <button class="wide mode active" data-mode="green">グリーン</button>
        <button class="wide mode" data-mode="stokes">ストークス</button>
        <button class="wide mode" data-mode="div">ガウス発散</button>
      </div>
      <div class="hint" id="mode-hint"></div>
    </div>

    <div class="group">
      <h2>ベクトル場 F</h2>
      <select id="field">
        <option value="rot">回転場 (−y, x, 0)</option>
        <option value="src">動径場 (x, y, z)</option>
        <option value="mix">混合場 (x−y, x+y, 2z)</option>
        <option value="var">変化場 (x²−y, y²+x, z)</option>
      </select>
      <div class="hint" id="field-hint"></div>
    </div>

    <div class="group" id="grp-region">
      <h2>領域・曲面</h2>
      <div class="btn-row" id="region-btns"></div>
      <label class="row"><span class="lab">大きさ R</span>
        <input id="size" type="range" min="0.6" max="1.8" step="0.05" value="1.2">
        <span class="val" id="size-v">1.20</span></label>
    </div>

    <div class="group">
      <h2>定理の検証</h2>
      <div id="thm">
        <div class="eq" id="thm-eq"></div>
        <div class="m"><span class="lhs" id="thm-lhs-l">左辺</span><span class="lhs" id="thm-lhs">—</span></div>
        <div class="m"><span class="rhs" id="thm-rhs-l">右辺</span><span class="rhs" id="thm-rhs">—</span></div>
        <div class="match" id="thm-match">—</div>
      </div>
      <div class="hint" id="thm-note"></div>
    </div>

    <div class="group">
      <h2>表示</h2>
      <label class="check"><input type="checkbox" id="opt-field" checked> ベクトル場 F の矢印</label>
      <label class="check"><input type="checkbox" id="opt-integrand" checked> 被積分量を色で表示</label>
      <label class="check"><input type="checkbox" id="opt-spin"> 自動回転 (3D)</label>
      <div class="legend"><span>負</span><div class="bar"></div><span>正</span></div>
    </div>

    <div class="group">
      <h2>解説</h2>
      <div class="hint">
        どれも一般化ストークスの定理 <code>∫<sub>∂Ω</sub> ω = ∫<sub>Ω</sub> dω</code> の特別な場合です。<b>左辺＝境界での積分</b>、<b>右辺＝内部での「微分（rot/div）」の積分</b>。両者が一致します。
        <hr class="sep">
        <b>ストークス</b>では、半球と平面円板を切り替えても左辺（境界の循環）が同じ → 右辺の面積分が<b>曲面の取り方に依らない</b>ことを確認できます。
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
//==================================================================
//  3大積分定理ビジュアライザ — 単一HTML・依存ゼロ・Canvas
//   グリーン:  ∮∂D (P dx + Q dy) = ∬D (Qx − Py) dA
//   ストークス: ∮∂S F·dr        = ∬S (rot F)·n dA
//   ガウス発散: ∯∂V F·n dA       = ∭V (div F) dV
//  いずれも左辺(境界積分)と右辺(内部での微分の積分)を数値計算し一致を示す
//==================================================================
const cv=document.getElementById('cv'); const ctx=cv.getContext('2d');

function add(a,b){return [a[0]+b[0],a[1]+b[1],a[2]+b[2]];}
function sub(a,b){return [a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function cross(a,b){return [a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function norm(a){return Math.hypot(a[0],a[1],a[2]);}
function normalize(a){const l=norm(a)||1;return [a[0]/l,a[1]/l,a[2]/l];}

//---------------------------- ベクトル場 ----------------------------
const FIELDS={
  rot:{ f:(x,y,z)=>[-y, x, 0],         hint:'純粋な渦。rot F=(0,0,2)（一定・上向き）、div F=0。ストークスで効きます。' },
  src:{ f:(x,y,z)=>[x, y, z],          hint:'外向きの湧き出し。div F=3（一定）、rot F=0。発散定理で効きます。' },
  mix:{ f:(x,y,z)=>[x-y, x+y, 2*z],    hint:'rot F=(0,0,2)、div F=4（ともに一定・非零）の一般的な場。' },
  var:{ f:(x,y,z)=>[x*x-y, y*y+x, z],  hint:'div F=2x+2y+1（場所で変化）、rot F=(0,0,2)。右辺の積分が本当に効く例。' },
};
let FID='rot';
const F=(x,y,z)=>FIELDS[FID].f(x,y,z);
const H=1e-4;
function divF(x,y,z){
  return ( (F(x+H,y,z)[0]-F(x-H,y,z)[0]) + (F(x,y+H,z)[1]-F(x,y-H,z)[1]) + (F(x,y,z+H)[2]-F(x,y,z-H)[2]) )/(2*H);
}
function curlF(x,y,z){
  const dFz_dy=(F(x,y+H,z)[2]-F(x,y-H,z)[2])/(2*H), dFy_dz=(F(x,y,z+H)[1]-F(x,y,z-H)[1])/(2*H);
  const dFx_dz=(F(x,y,z+H)[0]-F(x,y,z-H)[0])/(2*H), dFz_dx=(F(x+H,y,z)[2]-F(x-H,y,z)[2])/(2*H);
  const dFy_dx=(F(x+H,y,z)[1]-F(x-H,y,z)[1])/(2*H), dFx_dy=(F(x,y+H,z)[0]-F(x,y-H,z)[0])/(2*H);
  return [dFz_dy-dFy_dz, dFx_dz-dFz_dx, dFy_dx-dFx_dy];
}
function curl2d(x,y){ // ∂Q/∂x − ∂P/∂y  (P=Fx, Q=Fy, z=0)
  const dQdx=(F(x+H,y,0)[1]-F(x-H,y,0)[1])/(2*H), dPdy=(F(x,y+H,0)[0]-F(x,y-H,0)[0])/(2*H);
  return dQdx-dPdy;
}

//==================================================================
//  状態
//==================================================================
let S={
  mode:'green', region:'disk', R:1.2,
  showField:true, showIntegrand:true, spin:false,
  cam:{az:0.7, el:0.45, dist:5.2, focal:0},
  lhs:0, rhs:0,
  // 3D メッシュ（stokes/div の境界曲面）
  mesh:null, // {x,y,z,val(integrand), faces, nv,nf, valMax}
  boundary:null, // ストークスの境界曲線 [{p:[x,y,z]}...]
};
const REGIONS={
  green:[['disk','円板'],['square','正方形']],
  stokes:[['hemi','半球'],['disk3','平面円板']],
  div:[['ball','球'],['ellip','楕円体']],
};

//==================================================================
//  グリーン（2D）
//==================================================================
function computeGreen(){
  const R=S.R;
  // 左辺：∮ (P dx + Q dy)
  let lhs=0;
  const N=720;
  if(S.region==='disk'){
    for(let k=0;k<N;k++){ const th=2*Math.PI*k/N, dth=2*Math.PI/N;
      const x=R*Math.cos(th), y=R*Math.sin(th);
      const dx=-R*Math.sin(th)*dth, dy=R*Math.cos(th)*dth;
      const f=F(x,y,0); lhs+=f[0]*dx+f[1]*dy; }
  } else { // square [-R,R]^2, CCW
    const seg=(x0,y0,x1,y1)=>{ const M=300; for(let k=0;k<M;k++){
      const t=(k+0.5)/M; const x=x0+(x1-x0)*t, y=y0+(y1-y0)*t;
      const dx=(x1-x0)/M, dy=(y1-y0)/M; const f=F(x,y,0); lhs+=f[0]*dx+f[1]*dy; } };
    seg(-R,-R, R,-R); seg(R,-R, R,R); seg(R,R, -R,R); seg(-R,R, -R,-R);
  }
  // 右辺：∬ (Qx − Py) dA
  let rhs=0; const G=200, d=(2*R)/G, cell=d*d;
  for(let i=0;i<G;i++){ const x=-R+(i+0.5)*d;
    for(let j=0;j<G;j++){ const y=-R+(j+0.5)*d;
      if(S.region==='disk' && x*x+y*y>R*R) continue;
      rhs+=curl2d(x,y)*cell; } }
  S.lhs=lhs; S.rhs=rhs;
}

//==================================================================
//  ストークス / 発散（3D）— パラメトリック曲面を構築
//==================================================================
function paramSurface(Xf,u0,u1,v0,v1,NU,NV){
  const verts=[],uu=[],vv=[];
  for(let i=0;i<=NU;i++){ const u=u0+(u1-u0)*i/NU;
    for(let j=0;j<=NV;j++){ const v=v0+(v1-v0)*j/NV; verts.push(Xf(u,v)); uu.push(u); vv.push(v); } }
  const idx=(i,j)=>i*(NV+1)+j, faces=[];
  for(let i=0;i<NU;i++) for(let j=0;j<NV;j++){
    faces.push(idx(i,j),idx(i+1,j),idx(i+1,j+1)); faces.push(idx(i,j),idx(i+1,j+1),idx(i,j+1)); }
  return {verts,uu,vv,faces,Xf,u0,u1,v0,v1,NU,NV};
}
function surfDerivs(Xf,u,v){
  const h=1e-4;
  const Xu=sub(Xf(u+h,v),Xf(u-h,v)).map(c=>c/(2*h));
  const Xv=sub(Xf(u,v+h),Xf(u,v-h)).map(c=>c/(2*h));
  return {Xu,Xv};
}

function buildStokes(){
  const R=S.R;
  let Xf,u0,u1,v0,v1;
  if(S.region==='hemi'){ Xf=(u,v)=>[R*Math.sin(u)*Math.cos(v), R*Math.sin(u)*Math.sin(v), R*Math.cos(u)]; u0=0.0001;u1=Math.PI/2;v0=0;v1=2*Math.PI; }
  else { Xf=(u,v)=>[u*Math.cos(v), u*Math.sin(v), 0]; u0=0.0001;u1=R;v0=0;v1=2*Math.PI; } // 平面円板 (u=半径)
  const sp=paramSurface(Xf,u0,u1,v0,v1,40,60);
  // 右辺 ∬ rotF·n dA、頂点 integrand、向きは外向き(原点から外)に統一
  const nv=sp.verts.length; const val=new Float64Array(nv); let valMax=1e-9;
  let rhs=0;
  // 面ごとに積分（重心で評価）
  const F2=sp.faces;
  for(let q=0;q<F2.length;q+=3){
    const a=sp.verts[F2[q]],b=sp.verts[F2[q+1]],c=sp.verts[F2[q+2]];
    const cen=[(a[0]+b[0]+c[0])/3,(a[1]+b[1]+c[1])/3,(a[2]+b[2]+c[2])/3];
    let n=cross(sub(b,a),sub(c,a)); const area=0.5*norm(n); if(area<1e-12) continue; n=normalize(n);
    // 向き：半球は外向き(原点側と逆)、平面円板は +z に統一
    if(S.region==='hemi'){ if(dot(n,cen)<0) n=[-n[0],-n[1],-n[2]]; }
    else { if(n[2]<0) n=[-n[0],-n[1],-n[2]]; }
    const cl=curlF(cen[0],cen[1],cen[2]);
    rhs += dot(cl,n)*area;
  }
  // 頂点 integrand（色）: rotF·n（向きは外向き/+z）
  for(let i=0;i<nv;i++){ const p=sp.verts[i]; const d=surfDerivs(Xf,sp.uu[i],sp.vv[i]);
    let n=normalize(cross(d.Xu,d.Xv));
    if(S.region==='hemi'){ if(dot(n,p)<0) n=[-n[0],-n[1],-n[2]]; } else { if(n[2]<0) n=[-n[0],-n[1],-n[2]]; }
    val[i]=dot(curlF(p[0],p[1],p[2]),n); if(Math.abs(val[i])>valMax) valMax=Math.abs(val[i]); }
  // 左辺 ∮ F·dr（境界 = 半径Rの円, z=0, CCW）
  let lhs=0; const N=720;
  const bnd=[];
  for(let k=0;k<=N;k++){ const th=2*Math.PI*k/N; bnd.push([R*Math.cos(th),R*Math.sin(th),0]); }
  for(let k=0;k<N;k++){ const th=2*Math.PI*k/N, dth=2*Math.PI/N;
    const x=R*Math.cos(th), y=R*Math.sin(th); const dr=[-R*Math.sin(th)*dth, R*Math.cos(th)*dth, 0];
    const f=F(x,y,0); lhs+=dot(f,dr); }
  S.mesh={verts:sp.verts,faces:sp.faces,val,valMax,nv,nf:sp.faces.length/3};
  S.boundary=bnd; S.lhs=lhs; S.rhs=rhs;
}

function buildDiv(){
  const R=S.R; let Xf, a=R,b=R,c=R;
  if(S.region==='ellip'){ a=R*1.35; b=R*0.85; c=R*1.0; }
  Xf=(u,v)=>[a*Math.sin(u)*Math.cos(v), b*Math.sin(u)*Math.sin(v), c*Math.cos(u)];
  const sp=paramSurface(Xf,0.0001,Math.PI-0.0001,0,2*Math.PI,46,60);
  const nv=sp.verts.length; const val=new Float64Array(nv); let valMax=1e-9;
  // 左辺 ∯ F·n dA（外向き法線）：面ごとに評価
  let lhs=0; const F2=sp.faces;
  for(let q=0;q<F2.length;q+=3){
    const pa=sp.verts[F2[q]],pb=sp.verts[F2[q+1]],pc=sp.verts[F2[q+2]];
    const cen=[(pa[0]+pb[0]+pc[0])/3,(pa[1]+pb[1]+pc[1])/3,(pa[2]+pb[2]+pc[2])/3];
    let n=cross(sub(pb,pa),sub(pc,pa)); const area=0.5*norm(n); if(area<1e-12) continue; n=normalize(n);
    if(dot(n,cen)<0) n=[-n[0],-n[1],-n[2]]; // 外向き
    const f=F(cen[0],cen[1],cen[2]); lhs += dot(f,n)*area;
  }
  // 頂点 integrand（色）= F·n（フラックス密度）
  for(let i=0;i<nv;i++){ const p=sp.verts[i]; const d=surfDerivs(Xf,sp.uu[i],sp.vv[i]);
    let n=normalize(cross(d.Xu,d.Xv)); if(dot(n,p)<0) n=[-n[0],-n[1],-n[2]];
    val[i]=dot(F(p[0],p[1],p[2]),n); if(Math.abs(val[i])>valMax) valMax=Math.abs(val[i]); }
  // 右辺 ∭ div F dV（3Dグリッド, 楕円体内部）
  let rhs=0; const G=44; const dx=(2*a)/G, dy=(2*b)/G, dz=(2*c)/G, dV=dx*dy*dz;
  for(let i=0;i<G;i++){ const x=-a+(i+0.5)*dx;
    for(let j=0;j<G;j++){ const y=-b+(j+0.5)*dy;
      for(let k=0;k<G;k++){ const z=-c+(k+0.5)*dz;
        if((x*x)/(a*a)+(y*y)/(b*b)+(z*z)/(c*c)>1) continue;
        rhs += divF(x,y,z)*dV; } } }
  S.mesh={verts:sp.verts,faces:sp.faces,val,valMax,nv,nf:sp.faces.length/3};
  S.boundary=null; S.lhs=lhs; S.rhs=rhs;
}

function recompute(){
  if(S.mode==='green'){ S.mesh=null; S.boundary=null; computeGreen(); }
  else if(S.mode==='stokes'){ buildStokes(); }
  else { buildDiv(); }
  updateReadout();
}

//==================================================================
//  ビュー
//==================================================================
function resize(){
  const r=cv.parentElement.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=Math.floor(r.width*dpr); cv.height=Math.floor(r.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
  S.cam.focal=Math.min(r.width,r.height)*0.62; draw();
}
function rotate(x,y,z){
  const ca=Math.cos(S.cam.az),sa=Math.sin(S.cam.az),ce=Math.cos(S.cam.el),se=Math.sin(S.cam.el);
  const x1=x*ca+z*sa, z1=-x*sa+z*ca, y1=y;
  return [x1, y1*ce-z1*se, y1*se+z1*ce];
}
function proj3(p,r){ const rp=rotate(p[0],p[1],p[2]); const depth=S.cam.dist-rp[2];
  return [r.width/2+S.cam.focal*rp[0]/depth, r.height/2-S.cam.focal*rp[1]/depth, rp[2], depth]; }
function colorOf(t,shade){ // t in [-1,1] diverging blue-white-red
  t=Math.max(-1,Math.min(1,t)); let R,G,B;
  if(t>=0){ R=229+(239-229)*t; G=231-(231-68)*t; B=235-(235-68)*t; }
  else { const a=-t; R=229-(229-59)*a; G=231-(231-130)*a; B=235+(246-235)*a; }
  return `rgb(${(R*shade)|0},${(G*shade)|0},${(B*shade)|0})`;
}

//==================================================================
//  描画
//==================================================================
function draw(){
  const r=cv.parentElement.getBoundingClientRect();
  ctx.clearRect(0,0,r.width,r.height);
  if(S.mode==='green') drawGreen(r); else draw3D(r);
}

// ---- 2D グリーン ----
function world2(x,y,r,sc){ return [r.width/2 + x*sc, r.height/2 - y*sc]; }
function drawGreen(r){
  const R=S.R, sc=Math.min(r.width,r.height)*0.30/R*1.0;
  const SC=Math.min(r.width,r.height)*0.34/1.8; // 一定スケール（Rに依らず）
  const s=SC;
  // 被積分量 (Qx−Py) を領域内に色表示
  if(S.showIntegrand){
    const G=60, d=(2*R)/G; let vmax=1e-9; const grid=[];
    for(let i=0;i<G;i++){ const x=-R+(i+0.5)*d; for(let j=0;j<G;j++){ const y=-R+(j+0.5)*d;
      if(S.region==='disk' && x*x+y*y>R*R){ grid.push(null); continue; }
      const c=curl2d(x,y); grid.push({x,y,c}); if(Math.abs(c)>vmax)vmax=Math.abs(c); } }
    for(const g of grid){ if(!g) continue; const p=world2(g.x,g.y,r,s);
      ctx.fillStyle=colorOf(g.c/vmax,1); ctx.globalAlpha=0.5; ctx.fillRect(p[0]-(d*s/2)-0.5,p[1]-(d*s/2)-0.5,d*s+1,d*s+1); }
    ctx.globalAlpha=1;
  }
  // 領域の枠
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  // ベクトル場 F の矢印
  if(S.showField){
    const M=15, ext=1.7; let fmax=1e-9; const arr=[];
    for(let i=0;i<=M;i++){ const x=-ext+2*ext*i/M; for(let j=0;j<=M;j++){ const y=-ext+2*ext*j/M;
      const f=F(x,y,0); const m=Math.hypot(f[0],f[1]); if(m>fmax)fmax=m; arr.push({x,y,fx:f[0],fy:f[1]}); } }
    const gain=(2*ext/M)*s*0.9/ (fmax||1);
    ctx.strokeStyle='rgba(120,170,230,0.65)'; ctx.fillStyle='rgba(120,170,230,0.65)'; ctx.lineWidth=1;
    for(const a of arr){ const p=world2(a.x,a.y,r,s); arrow2(p[0],p[1], p[0]+a.fx*gain, p[1]-a.fy*gain); }
  }
  // 境界 ∂D（向きつき, 黄）
  ctx.strokeStyle='#ffe08a'; ctx.lineWidth=2.6; ctx.beginPath();
  const bpts=[];
  if(S.region==='disk'){ for(let k=0;k<=120;k++){ const th=2*Math.PI*k/120; bpts.push([R*Math.cos(th),R*Math.sin(th)]); } }
  else { bpts.push([-R,-R],[R,-R],[R,R],[-R,R],[-R,-R]); }
  bpts.forEach((q,i)=>{ const p=world2(q[0],q[1],r,s); i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]); }); ctx.stroke();
  // 向き矢印（CCW）
  ctx.fillStyle='#ffe08a'; ctx.strokeStyle='#ffe08a';
  const na=12; for(let k=0;k<na;k++){ const t=k/na;
    let x,y,tx,ty;
    if(S.region==='disk'){ const th=2*Math.PI*t; x=R*Math.cos(th); y=R*Math.sin(th); tx=-Math.sin(th); ty=Math.cos(th); }
    else { const seg=Math.floor(t*4), ft=t*4-seg; const cs=[[-R,-R],[R,-R],[R,R],[-R,R]]; const a=cs[seg],b=cs[(seg+1)%4];
      x=a[0]+(b[0]-a[0])*ft; y=a[1]+(b[1]-a[1])*ft; tx=b[0]-a[0]; ty=b[1]-a[1]; const m=Math.hypot(tx,ty); tx/=m; ty/=m; }
    const p=world2(x,y,r,s); arrow2(p[0]-tx*9, p[1]+ty*9, p[0]+tx*9, p[1]-ty*9, 6); }
  ctx.lineWidth=1;
}
function arrow2(x1,y1,x2,y2,ah){ ah=ah||5; const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); if(len<2) return;
  const ux=dx/len,uy=dy/len; ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-ah*ux-ah*0.5*uy, y2-ah*uy+ah*0.5*ux); ctx.lineTo(x2-ah*ux+ah*0.5*uy, y2-ah*uy-ah*0.5*ux);
  ctx.closePath(); ctx.fill(); }

// ---- 3D ストークス/発散 ----
function draw3D(r){
  if(!S.mesh) return; const m=S.mesh; const nv=m.nv;
  const SX=new Float64Array(nv),SY=new Float64Array(nv),RZ=new Float64Array(nv),RX=new Float64Array(nv),RY=new Float64Array(nv);
  for(let i=0;i<nv;i++){ const rp=rotate(m.verts[i][0],m.verts[i][1],m.verts[i][2]); RX[i]=rp[0];RY[i]=rp[1];RZ[i]=rp[2];
    const depth=S.cam.dist-rp[2]; SX[i]=r.width/2+S.cam.focal*rp[0]/depth; SY[i]=r.height/2-S.cam.focal*rp[1]/depth; }
  const F2=m.faces, nf=m.nf, order=new Array(nf), fz=new Float64Array(nf);
  for(let q=0;q<nf;q++){ const a=F2[3*q],b=F2[3*q+1],c=F2[3*q+2]; fz[q]=(RZ[a]+RZ[b]+RZ[c])/3; order[q]=q; }
  order.sort((p,q)=>fz[p]-fz[q]);
  const L=normalize([0.35,0.45,0.82]);
  const transl = (S.mode==='stokes' && S.region==='disk3') ? 1 : 0.9; // 平面円板は薄く塗る
  for(let o=0;o<nf;o++){ const q=order[o],a=F2[3*q],b=F2[3*q+1],c=F2[3*q+2];
    const ux=RX[b]-RX[a],uy=RY[b]-RY[a],uz=RZ[b]-RZ[a], vx=RX[c]-RX[a],vy=RY[c]-RY[a],vz=RZ[c]-RZ[a];
    let nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx; const nl=Math.hypot(nx,ny,nz)||1; nz/=nl;
    const lam=Math.max(0,Math.abs((uy*vz-uz*vy)*L[0]+(uz*vx-ux*vz)*L[1]+(ux*vy-uy*vx)*L[2])/nl); const shade=0.4+0.6*lam;
    let fill;
    if(S.showIntegrand){ const t=(m.val[a]+m.val[b]+m.val[c])/3/(m.valMax||1); fill=colorOf(t,shade); }
    else fill=`rgb(${(110*shade)|0},${(150*shade)|0},${(210*shade)|0})`;
    ctx.globalAlpha = (S.mode==='div')?1: (S.region==='disk3'?0.78:0.95);
    ctx.beginPath(); ctx.moveTo(SX[a],SY[a]); ctx.lineTo(SX[b],SY[b]); ctx.lineTo(SX[c],SY[c]); ctx.closePath();
    ctx.fillStyle=fill; ctx.fill(); ctx.strokeStyle=fill; ctx.lineWidth=0.5; ctx.stroke();
  }
  ctx.globalAlpha=1;
  // ベクトル場 F の矢印（3D 格子）
  if(S.showField){
    const ext=S.R*1.25, M=4; let fmax=1e-9; const pts=[];
    for(let i=0;i<=M;i++)for(let j=0;j<=M;j++)for(let k=0;k<=M;k++){
      const x=-ext+2*ext*i/M, y=-ext+2*ext*j/M, z=-ext+2*ext*k/M;
      const f=F(x,y,z); const mg=norm(f); if(mg>fmax)fmax=mg; pts.push([x,y,z,f]); }
    const gain=(2*ext/M)*0.8/(fmax||1);
    for(const pt of pts){ const p0=proj3([pt[0],pt[1],pt[2]],r);
      const tip=[pt[0]+pt[3][0]*gain, pt[1]+pt[3][1]*gain, pt[2]+pt[3][2]*gain]; const p1=proj3(tip,r);
      const al=Math.max(0.15,Math.min(0.8,(p0[2]+S.R)/(2*S.R))); ctx.globalAlpha=al;
      ctx.strokeStyle='#9ec3ff'; ctx.fillStyle='#9ec3ff'; ctx.lineWidth=1; arrow2(p0[0],p0[1],p1[0],p1[1],4); }
    ctx.globalAlpha=1;
  }
  // ストークスの境界曲線（黄, 向きつき）
  if(S.boundary){ const b=S.boundary;
    ctx.strokeStyle='#ffe08a'; ctx.lineWidth=3; ctx.beginPath();
    for(let i=0;i<b.length;i++){ const p=proj3(b[i],r); i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]); } ctx.stroke();
    ctx.fillStyle='#ffe08a'; ctx.strokeStyle='#ffe08a';
    const na=10; for(let k=0;k<na;k++){ const idx=Math.floor(b.length*k/na); const th=2*Math.PI*k/na;
      const p=proj3(b[idx],r); const tang=[-Math.sin(th),Math.cos(th),0]; const pt=proj3([b[idx][0]+tang[0]*0.18*S.R,b[idx][1]+tang[1]*0.18*S.R,b[idx][2]],r);
      arrow2(p[0],p[1],pt[0],pt[1],6); }
  }
}

//==================================================================
//  読み出し / UI
//==================================================================
const MODEINFO={
  green:{ eq:'∮<sub>∂D</sub> (P dx + Q dy) = ∬<sub>D</sub> (∂Q/∂x − ∂P/∂y) dA', lhs:'左辺 ∮ (P dx+Q dy)', rhs:'右辺 ∬ (Qx−Py) dA',
    hint:'2次元の場 F=(P,Q)。境界 ∂D 上の循環（左辺）と、回転 (Qx−Py) の面積分（右辺）が一致します。',
    note:'右辺の色は被積分量 Qx−Py。回転場では一定値（=2）になり、面積×2 と一致します。' },
  stokes:{ eq:'∮<sub>∂S</sub> F·dr = ∬<sub>S</sub> (rot F)·n dA', lhs:'左辺 ∮ F·dr', rhs:'右辺 ∬ rotF·n dA',
    hint:'境界 ∂S 上の循環（左辺）と、回転 rot F の面フラックス（右辺）が一致。半球↔平面円板で曲面に依らないことを確認。',
    note:'色は被積分量 rotF·n。半球と平面円板は境界が同じなので左辺は不変、右辺も一致します（曲面独立性）。' },
  div:{ eq:'∯<sub>∂V</sub> F·n dA = ∭<sub>V</sub> (div F) dV', lhs:'左辺 ∯ F·n dA', rhs:'右辺 ∭ divF dV',
    hint:'閉曲面 ∂V を通る外向きフラックス（左辺）と、発散 div F の体積積分（右辺）が一致します。',
    note:'色は境界面でのフラックス密度 F·n（赤=外向き/青=内向き）。変化場では div が場所で変わり、右辺の体積積分が効きます。' },
};
function updateReadout(){
  const info=MODEINFO[S.mode]; const id=x=>document.getElementById(x);
  id('thm-eq').innerHTML=info.eq; id('thm-lhs-l').textContent=info.lhs; id('thm-rhs-l').textContent=info.rhs;
  id('thm-lhs').textContent=S.lhs.toFixed(4); id('thm-rhs').textContent=S.rhs.toFixed(4);
  id('thm-note').innerHTML=info.note;
  const diff=Math.abs(S.lhs-S.rhs), scale=Math.max(1,Math.abs(S.lhs),Math.abs(S.rhs));
  const mm=id('thm-match');
  if(diff/scale<0.02){ mm.className='match ok'; mm.textContent='✓ 一致（差 '+diff.toFixed(4)+'）'; }
  else { mm.className='match no'; mm.textContent='差 '+diff.toFixed(4)+'（メッシュを細かくすると縮小）'; }
  const st=id('status'); st.innerHTML='定理: <b>'+({green:'グリーン',stokes:'ストークス',div:'ガウス発散'})[S.mode]+'</b> &nbsp; 左辺 <b>'+S.lhs.toFixed(3)+'</b> = 右辺 <b>'+S.rhs.toFixed(3)+'</b>';
  id('field-hint').textContent=FIELDS[FID].hint;
  id('mode-hint').textContent=info.hint;
}
function buildRegionButtons(){
  const box=document.getElementById('region-btns'); box.innerHTML='';
  REGIONS[S.mode].forEach(([key,label],i)=>{ const b=document.createElement('button'); b.className='wide'+(i===0?' active':''); b.textContent=label; b.dataset.region=key;
    b.addEventListener('click',()=>{ S.region=key; [...box.children].forEach(x=>x.classList.toggle('active',x===b)); recompute(); draw(); }); box.appendChild(b); });
  S.region=REGIONS[S.mode][0][0];
}
function setMode(mode){
  S.mode=mode;
  document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  document.getElementById('hintbar').textContent = mode==='green' ? '2次元表示（回転・ズーム不要）' : 'ドラッグで回転 / ホイールで拡大縮小';
  // カメラ初期化（3D）
  S.cam={az:0.7, el:mode==='div'?0.35:0.5, dist:mode==='div'?5.6:5.2, focal:S.cam.focal};
  buildRegionButtons(); recompute(); draw();
}

//---------------------------- 操作 ----------------------------
let dragging=false,lastX=0,lastY=0;
cv.addEventListener('pointerdown',e=>{ if(S.mode==='green')return; dragging=true;lastX=e.clientX;lastY=e.clientY; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointermove',e=>{ if(!dragging)return; S.cam.az+=(e.clientX-lastX)*0.008; S.cam.el+=(e.clientY-lastY)*0.008;
  S.cam.el=Math.max(-1.45,Math.min(1.45,S.cam.el)); lastX=e.clientX;lastY=e.clientY; draw(); });
cv.addEventListener('pointerup',()=>{ dragging=false; });
cv.addEventListener('wheel',e=>{ if(S.mode==='green')return; e.preventDefault(); S.cam.dist*=Math.exp(e.deltaY*0.0012); S.cam.dist=Math.max(3,Math.min(14,S.cam.dist)); draw(); },{passive:false});

function bindUI(){
  document.querySelectorAll('.mode').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
  document.getElementById('field').addEventListener('change',e=>{ FID=e.target.value; recompute(); draw(); });
  const sz=document.getElementById('size');
  sz.addEventListener('input',()=>{ S.R=parseFloat(sz.value); document.getElementById('size-v').textContent=S.R.toFixed(2); recompute(); draw(); });
  document.getElementById('opt-field').addEventListener('change',e=>{ S.showField=e.target.checked; draw(); });
  document.getElementById('opt-integrand').addEventListener('change',e=>{ S.showIntegrand=e.target.checked; draw(); });
  document.getElementById('opt-spin').addEventListener('change',e=>{ S.spin=e.target.checked; });
  window.addEventListener('resize',resize);
}
function frame(){ if(S.spin && !dragging && S.mode!=='green'){ S.cam.az+=0.004; draw(); } requestAnimationFrame(frame); }

bindUI(); resize(); setMode('green'); requestAnimationFrame(frame);
</script>
</body>
